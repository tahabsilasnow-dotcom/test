<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Three.js Test</title>
<style>body{margin:0;background:#1a1530;color:#fff;font-family:system-ui}</style>
</head><body>
<canvas id="c" width="400" height="300" style="display:block;margin:20px auto;border:1px solid rgba(255,255,255,0.1)"></canvas>
<div id="status" style="text-align:center;margin-top:10px">Testing...</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const status = document.getElementById('status');
try {
  if (typeof THREE === 'undefined') throw new Error('THREE not loaded');
  const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c'), antialias: true});
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, 400/300, 0.1, 10);
  camera.position.z = 3;
  scene.add(new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color:0xff6b7d})));
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  scene.add(new THREE.DirectionalLight(0xffffff, 0.8));
  renderer.render(scene, camera);
  status.textContent = '✅ Three.js works! You should see a pink cube above.';
  status.style.color = '#44ff88';
} catch(e) {
  status.textContent = '❌ ' + e.message;
  status.style.color = '#ff4444';
}
</script>
</body></html>
