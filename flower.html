<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌸 Flower — for Houda</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0}body{overflow:hidden;background:#0a0a14;color:#fff;font-family:system-ui,sans-serif}
#info{position:fixed;bottom:20px;left:0;right:0;text-align:center;font-size:0.85rem;opacity:0.4;z-index:2;pointer-events:none}
</style>
</head>
<body>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
camera.position.set(3, 2, 5);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Background gradient sky
const skyGeo = new THREE.SphereGeometry(30, 32, 32);
const canvas = document.createElement('canvas'); canvas.width = 1; canvas.height = 256;
const ctx = canvas.getContext('2d');
const g = ctx.createLinearGradient(0,0,0,256);
g.addColorStop(0,'#0a0a2e'); g.addColorStop(0.3,'#1a1a3e'); g.addColorStop(0.5,'#2a1a3e');
g.addColorStop(0.7,'#3a1a2e'); g.addColorStop(1,'#4a2030');
ctx.fillStyle = g; ctx.fillRect(0,0,1,256);
const tex = new THREE.CanvasTexture(canvas);
scene.add(new THREE.Mesh(skyGeo, new THREE.MeshBasicMaterial({map:tex, side:THREE.BackSide})));

// Ground
const ground = new THREE.Mesh(new THREE.CircleGeometry(8, 32),
  new THREE.MeshStandardMaterial({color:0x1a1530, roughness:0.9, metalness:0.05}));
ground.rotation.x = -Math.PI/2; ground.position.y = -0.01;
scene.add(ground);

// Lights
scene.add(new THREE.AmbientLight(0x443366, 0.3));
scene.add(new THREE.HemisphereLight(0xffeedd, 0x443366, 0.6));
const dl = new THREE.DirectionalLight(0xffccaa, 0.8); dl.position.set(5, 8, 5); dl.castShadow = true;
scene.add(dl);
const pl = new THREE.PointLight(0xff6bcd, 0.8, 10); pl.position.set(0, 2, 0);
scene.add(pl);

// === Build the flower ===
const group = new THREE.Group();

// Stem
const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 1.2, 8),
  new THREE.MeshStandardMaterial({color:0x3f9153, roughness:0.6}));
stem.position.y = 0.6;
group.add(stem);

// Leaves
[0.4, -0.4].forEach(z => {
  const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8),
    new THREE.MeshStandardMaterial({color:0x4aa55a, roughness:0.5}));
  leaf.scale.set(1.8, 0.15, 0.5);
  leaf.position.set(0, 0.5, z);
  group.add(leaf);
});

// Petals — 2 layers
const petalColors = [0xff6b7d, 0xff8a9e, 0xffaacc, 0xff6bcd, 0xff88aa, 0xff99bb, 0xff77aa, 0xff6b7d];
for (let layer = 0; layer < 2; layer++) {
  const count = 8;
  for (let i = 0; i < count; i++) {
    const a = (i / count) * Math.PI * 2 + layer * 0.3;
    const r = 0.2 + layer * 0.12;
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8),
      new THREE.MeshStandardMaterial({color: petalColors[(i + layer * 3) % petalColors.length], roughness: 0.3, emissive: 0xff4477, emissiveIntensity: 0.05}));
    p.scale.set(1, 0.3, 1.8);
    p.position.set(Math.cos(a) * r, 1.2 + layer * 0.08, Math.sin(a) * r);
    p.rotation.x = 0.2 + layer * 0.15;
    p.rotation.y = -a;
    group.add(p);
  }
}

// Center
const center = new THREE.Mesh(new THREE.IcosahedronGeometry(0.12, 1),
  new THREE.MeshStandardMaterial({color:0xffc94d, emissive:0xffc94d, emissiveIntensity:0.3, roughness:0.3}));
center.position.y = 1.22;
group.add(center);

// Inner glow center
const glow = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8),
  new THREE.MeshStandardMaterial({color:0xffffff, emissive:0xffdd88, emissiveIntensity:0.8}));
glow.position.y = 1.22;
group.add(glow);

group.position.y = 0.4;
scene.add(group);

// Floating particles
const particleGeo = new THREE.BufferGeometry();
const particleCount = 80;
const positions = new Float32Array(particleCount * 3);
const sizes = new Float32Array(particleCount);
for (let i = 0; i < particleCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const r = 1 + Math.random() * 2;
  positions[i*3] = Math.cos(theta) * r;
  positions[i*3+1] = 0.5 + Math.random() * 3;
  positions[i*3+2] = Math.sin(theta) * r;
  sizes[i] = 0.02 + Math.random() * 0.03;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
const pm = new THREE.PointsMaterial({color:0xff88cc, size:0.03, transparent:true, opacity:0.6, sizeAttenuation:true});
const particles = new THREE.Points(particleGeo, pm);
scene.add(particles);

// Orbiting glow dots
const orbitDots = [];
for (let i = 0; i < 6; i++) {
  const dot = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 6),
    new THREE.MeshBasicMaterial({color: 0xff6bcd, transparent: true, opacity: 0.5}));
  dot.userData.angle = (i / 6) * Math.PI * 2;
  dot.userData.radius = 0.6 + Math.random() * 0.2;
  dot.userData.speed = 0.8 + Math.random() * 0.4;
  dot.userData.offsetY = Math.random() * 0.3;
  scene.add(dot);
  orbitDots.push(dot);
}

// Stats
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.008;

  // Gentle flower sway
  group.rotation.y += 0.003;
  group.position.y = 0.4 + Math.sin(time * 0.9) * 0.04;

  // Particles float
  const pos = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pos[i*3+1] += Math.sin(time * 0.5 + i) * 0.001;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // Orbit dots
  orbitDots.forEach(dot => {
    dot.userData.angle += 0.004 * dot.userData.speed;
    const a = dot.userData.angle;
    const rad = dot.userData.radius;
    dot.position.x = Math.cos(a) * rad;
    dot.position.z = Math.sin(a) * rad;
    dot.position.y = 1.2 + Math.sin(time * 2 + a) * 0.15;
  });

  camera.position.x = 3 * Math.cos(time * 0.02);
  camera.position.z = 3 * Math.sin(time * 0.02);
  camera.lookAt(0, 0.8, 0);

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
<div id="info">🌸 Made with love — Mohamed ❤️ Houda</div>
</body>
</html>
